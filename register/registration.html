<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.boxicons.com/3.0.8/fonts/basic/boxicons.min.css" rel="stylesheet">
    <link rel="StyleSheet" href="regStyle.css">
    <title>Document</title>
</head>
<body>
    <div class="wrapper">
        <form action="">
            <h1>REGISTRATION FORM</h1>

            <div class="input-box">
                <input type="text" 
                    placeholder="Username" 
                    id="username" 
                    minlength="4"  
                    maxlength="10" 
                    required
                >
                <svg  xmlns="http://www.w3.org/2000/svg" width="16" height="16"  
                    fill="currentColor" viewBox="2 2 20 20" >
                    <path d="M12 6c-2.28 0-4 1.72-4 4s1.72 4 4 4 4-1.72 4-4-1.72-4-4-4m0 6c-1.18 0-2-.82-2-2s.82-2 2-2 2 .82 2 2-.82 2-2 2"></path><path d="M12 2C6.49 2 2 6.49 2 12c0 3.26 1.58 6.16 4 7.98V20h.03c1.67 1.25 3.73 2 5.97 2s4.31-.75 5.97-2H18v-.02c2.42-1.83 4-4.72 4-7.98 0-5.51-4.49-10-10-10M8.18 19.02C8.59 17.85 9.69 17 11 17h2c1.31 0 2.42.85 2.82 2.02-1.14.62-2.44.98-3.82.98s-2.69-.35-3.82-.98m9.3-1.21c-.81-1.66-2.51-2.82-4.48-2.82h-2c-1.97 0-3.66 1.16-4.48 2.82A7.96 7.96 0 0 1 4 11.99c0-4.41 3.59-8 8-8s8 3.59 8 8c0 2.29-.97 4.36-2.52 5.82"></path>
                </svg>
            </div>

            <div class="input-box">
                <input type="email" 
                    placeholder="Email" 
                    id="email" 
                    required
                >
                <svg  xmlns="http://www.w3.org/2000/svg" width="16" height="16"  
                    fill="currentColor" viewBox="0 0 24 24" >
                    <path d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2m0 2v.51l-8 6.22-8-6.22V6zM4 18V9.04l7.39 5.74c.18.14.4.21.61.21s.43-.07.61-.21L20 9.03v8.96H4Z"></path>
                </svg>
            </div>

            <div class="input-box">
                <input type="password" 
                    placeholder="Password" 
                    id="password" 
                    pattern="^(?=.*[A-Z])(?=(.*[A-Za-z]){2,})(?=.*[!@#$%^&*]).+$" 
                    title="Password must contain at least 1 uppercase letter, 2 letters, and 1 special character"
                    required
                >
                <svg  xmlns="http://www.w3.org/2000/svg" width="16" height="16"  
                    fill="currentColor" viewBox="2 2 20 20" >
                    <path d="M6 22h12c1.1 0 2-.9 2-2v-9c0-1.1-.9-2-2-2h-1V7c0-2.76-2.24-5-5-5S7 4.24 7 7v2H6c-1.1 0-2 .9-2 2v9c0 1.1.9 2 2 2M9 7c0-1.65 1.35-3 3-3s3 1.35 3 3v2H9zm-3 4h12v9H6z"></path>
                </svg>
            </div>

            <div class="input-box">
                <input type="date">
                <label>Date Of Birth</label>
                <svg class="icon" xmlns="http://www.w3.org/2000/svg" 
                    fill="none" viewBox="0 0 24 24" stroke="white" width="20">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M8 7V3m8 4V3m-9 8h10m-11 9h12a2 2 0 002-2V7a2 2 0 00-2-2H6a2 2 0 00-2 2v11a2 2 0 002 2z" />
                </svg>
                
            </div>

            <div class="input-box">
                <input type="number" 
                placeholder="Age"
                maxlength="3"
                required
                >
                <svg  xmlns="http://www.w3.org/2000/svg" width="18" height="18"  
                    fill="currentColor" viewBox="0 0 24 24" >
                    <path d="M12 4a2 2 0 1 0 0 4 2 2 0 1 0 0-4m-3 9v7h2v-4h2v4h2v-7l1.2 1.6 1.6-1.2-3-4A1 1 0 0 0 14 9h-4c-.31 0-.61.15-.8.4l-3 4 1.6 1.2z"></path>
                </svg>
            </div>

            <div class="input-box">
                <select id="box" required>
                    <option value="" disabled selected class="option">Select Gender</option>
                    <option value="male" class="option">Male</option>
                    <option value="female" class="option">Female</option>
                    <option value="other" class="option">Other</option>
                </select>
                <svg  xmlns="http://www.w3.org/2000/svg" width="16" height="16"  
                    fill="currentColor" viewBox="0 0 24 24" >
                    <!--Boxicons v3.0.8 https://boxicons.com | License  https://docs.boxicons.com/free-->
                    <path d="M6 2a2 2 0 1 0 0 4 2 2 0 1 0 0-4M4 22h4v-7h2V8c0-.55-.45-1-1-1H3c-.55 0-1 .45-1 1v7h2zM17 2a2 2 0 1 0 0 4 2 2 0 1 0 0-4m2 5h-4c-.45 0-.84.3-.96.73l-2 7 1.59.45L13 18h2v4h4v-4h2l-.63-2.82 1.59-.45-2-7C19.84 7.3 19.44 7 19 7"></path>
                </svg>

            </div>

            <button type="submit" class="btn">Register</button>

            <div class="Login">
                <p>Already have an account? <a href="../LOGIN-CODE/Login.html">Login in</a></p>
            </div>
        </form>
    </div>

    <script src="../../JS/registration.js"></script>
</body>
</html>
